# Netlify Configuration for Performance Optimization

# Build settings
[build]
  command = "npm run build"
  publish = "app/dist"
  functions = "functions"

# Cache headers for optimal caching strategy
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Static assets - long-term caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - no caching for freshness
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# CSS and JS files - short caching with revalidation
[[headers]]
  for = "/assets/*.{css,js}"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Font files - long-term caching
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Image files - long-term caching
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect configuration
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Post-processing rules for optimization
[context.production]
  environment = { NODE_ENV = "production" }

# Build on deploy
[env]
  NODE_ENV = "production"
